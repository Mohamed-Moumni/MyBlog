baseURL = "https://mmoumni.com/"
languageCode = "en-us"
title = "mmoumni"
theme = "terminal"

enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  centerTheme = true
  primaryColor = "#1a73e8"
  readingTime = true

  # Custom author (if not globally defined)
  author = "Mohamed Moumni"

  [params.twitter]
    creator = "@moumni_08"
    site = "@moumni_08"


[languages]
  [languages.en]
    languageName = "English"
    title = "Mmoumni"

    [languages.en.params]
      subtitle = "Mohamed Moumni — Backend Developer & Systems Engineer writing about Go, C/C++, distributed systems, and networking."
      owner = "Mohamed Moumni"
      keywords = "backend development, Go, C++, systems engineering, distributed systems, networking, software engineering"
      copyright = "© 2025 Mohamed Moumni"
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"
      newerPosts = "Newer posts"
      olderPosts = "Older posts"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home page"
      minuteReadingTime = "min read"
      words = "words"

      [languages.en.params.logo]
        logoText = "Mmoumni"
        logoHomeLink = "/"

      [languages.en.menu]
        [[languages.en.menu.main]]
          identifier = "about"
          name = "About"
          url = "/"
        [[languages.en.menu.main]]
          identifier = "posts"
          name = "Posts"
          url = "/posts"
        [[languages.en.menu.main]]
          identifier = "projects"
          name = "Projects"
          url = "/projects"
        [[languages.en.menu.main]]
          identifier = "books"
          name = "Books"
          url = "/books"